# =============================================================================
# Agent Self-Evolution: Memory System Configuration Template
# =============================================================================
# 将此文件中的配置合并到你的 agent 配置文件（如 ~/.hermes/config.yaml）中。
# 每个段落标注了对应的记忆层级和学习阶段。
# =============================================================================

# ---------------------------------------------------------------------------
# Layer 1: 短期推理记忆 — 上下文窗口与压缩
# ---------------------------------------------------------------------------
context:
  # 上下文引擎：compressor = 内置压缩器；也可使用自定义插件引擎
  engine: compressor

compression:
  # 是否启用自动压缩
  enabled: true
  # 触发阈值：当前 token 用量达到上下文限制的此比例时触发（0.0-1.0）
  threshold: 0.50
  # 压缩摘要的目标大小（占上下文预算的比例）
  target_ratio: 0.20
  # 保护头部 N 条消息（系统提示词 + 初始对话）
  protect_first_n: 3
  # 保护尾部 N 条消息（最近的对话）
  protect_last_n: 20

# ---------------------------------------------------------------------------
# Layer 2: 过程性技能记忆 — 技能自动创建与优化
# ---------------------------------------------------------------------------
skills:
  # 技能自动创建的触发间隔（每 N 轮对话触发一次后台复盘）
  creation_nudge_interval: 10
  # 额外的技能目录（除 ~/.hermes/skills/ 之外）
  external_dirs: []
  # 禁用的技能名称列表
  disabled: []
  # 各技能的配置覆盖
  config: {}
  # 示例：
  # config:
  #   agent-self-evolution:
  #     output_dir: "./learning-output"
  #     auto_evolve: true

# ---------------------------------------------------------------------------
# Layer 3: 情境持久化检索 — 外部记忆提供者
# ---------------------------------------------------------------------------
memory:
  # 外部记忆提供者（留空则仅使用内置 MEMORY.md/USER.md）
  # 可选值: honcho, retaindb, holographic, mem0, hindsight, supermemory, openviking, byterover
  provider: null

  # 是否启用内置记忆（MEMORY.md）
  memory_enabled: true

  # 是否启用用户画像（USER.md）
  user_profile_enabled: true

  # 记忆自动复盘的触发间隔（每 N 轮对话触发一次后台 Memory 复盘）
  nudge_interval: 10

# ---------------------------------------------------------------------------
# Layer 4: 用户画像建模 — 无独立配置段，由 memory.* 控制
# ---------------------------------------------------------------------------
# USER.md 最大 1375 字符，以 § 分隔条目
# MEMORY.md 最大 2200 字符，以 § 分隔条目
# 两者均支持原子写入 + 文件锁，多进程安全

# ---------------------------------------------------------------------------
# Layer 5: 全文检索会话存档 — 自动配置，无需手动设置
# ---------------------------------------------------------------------------
# SQLite 数据库位置: ~/.hermes/state.db
# FTS5 全文索引自动维护
# 使用 session_search 工具进行跨会话搜索

# ---------------------------------------------------------------------------
# 闭环学习循环: Phase 1 — EXECUTE（执行）
# ---------------------------------------------------------------------------
agent:
  # 主循环最大迭代次数（含工具调用）
  max_turns: 90
  # 工具使用强制模式
  tool_use_enforcement: null

# ---------------------------------------------------------------------------
# 闭环学习循环: Phase 1 — 子代理委派
# ---------------------------------------------------------------------------
delegation:
  # 子代理最大迭代次数
  max_iterations: 50
  # 委派嵌套深度（1 = 子代理不能再委派）
  max_depth: 1
  # 并发子代理数量上限
  max_concurrent_children: 3
  # 子代理超时时间（秒）
  timeout: 600
  # 子代理使用的模型（可选覆盖）
  model: null
  # 子代理使用的 provider（可选覆盖）
  provider: null

# ---------------------------------------------------------------------------
# 闭环学习循环: Phase 4 — 进化优化（独立 CLI 运行）
# ---------------------------------------------------------------------------
# 以下配置用于 hermes-agent-self-evolution 进化管线：
#
# evolution:
#   # 优化迭代次数
#   iterations: 10
#   # 种群大小（每代保留的变体数）
#   population_size: 5
#   # 优化器模型（生成变体 + 反思）
#   optimizer_model: "openai/gpt-4.1"
#   # 评估模型（LLM-as-judge 评分）
#   eval_model: "openai/gpt-4.1-mini"
#   # 技能文件最大大小 (KB)
#   max_skill_size_kb: 15
#   # 提示词最大增长比例
#   max_prompt_growth_percent: 20

# ---------------------------------------------------------------------------
# 安全配置
# ---------------------------------------------------------------------------
security:
  # TIRith 安全检查（推荐启用）
  tirith_enabled: false
  # 网站黑名单（web_search 工具使用）
  website_blocklist: []

# ---------------------------------------------------------------------------
# 工具集配置（按平台分别设置）
# ---------------------------------------------------------------------------
toolsets:
  cli:
    - terminal
    - file
    - web
    - memory
    - skills
    - session_search
    - delegation
    - code_execution
    - vision
    - browser
  # 网关平台配置（Telegram, Discord 等通常使用精简工具集）
  telegram:
    - terminal
    - file
    - web
    - memory
    - session_search
  discord:
    - terminal
    - file
    - web
    - memory
    - session_search
